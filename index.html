<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="login.css">
</head>
<body>
<video src="104452_trimmed.mp4" autoplay muted loop></video>
<h1  style="color: white;">Login to access DSA Sheet</h1>
<div class="container">
    <button onclick="openModal('login')">Login</button>
    <button onclick="openModal('signup')">Signup</button>
</div>
<div class="overlay" id="overlay"></div>
<div class="modal" id="login">
<div class="content">
<h3 style="color: white;">Login</h3>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<button onclick="window.location.href='index.html'">Back</button>
<button onclick="validateLogin()">Submit</button>
<p style="color: white;">Demo Username: demo_user</p>
<p style="color: white;">Demo Password: demo_password</p>
</div>
</div>
<div class="modal" id="signup">
<div class="content">
<h3 style="color: white;">Signup</h3>
<input type="text" placeholder="Email"><br><br>
<input type="text" placeholder="Username"><br><br>
<input type="password" placeholder="Password"><br><br>
<input type="password" placeholder="Confirm Password"><br><br>
<button onclick="window.location.href='index.html'">Back</button>
<button onclick="window.location.href='home.html'">Register</button>
</div>
</div>
<hr>
<footer>
<p style="color: white; text-align: center;">&copy; 2026 AlgoTracker. All rights reserved.</p>
</footer>
<script>
    function validateLogin() {
    const username = document.querySelector("#login input[placeholder='Username']").value;
    const password = document.querySelector("#login input[placeholder='Password']").value;
    if (username === "demo_user" && password === "demo_password") {
        window.location.href = "home.html";
    } else {
        alert("Invalid credentials");
    }
}
function openModal(id) {
let modal = document.getElementById(id);
let overlay = document.getElementById("overlay");
modal.style.zIndex = "900";
modal.style.opacity = "1";
overlay.style.zIndex = "899";
overlay.style.opacity = "1";
document.querySelectorAll(".modal").forEach(function(modal) {
modal.addEventListener("click", function(e) {
if (e.target === modal) {
modal.style.zIndex = "-1";
modal.style.opacity = "0";
}
});
});
}
</script>
</body>
</html>
